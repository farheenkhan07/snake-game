<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>🐍 Snake</h1>

  <!-- Score board -->
  <div class="scoreboard">
    <div class="score-box">Score <span id="score">0</span></div>
    <div class="score-box">Best &nbsp;<span id="best">0</span></div>
    <div class="score-box">Level <span id="level">1</span></div>
  </div>

  <!-- The game canvas — the snake and food are drawn here by JavaScript -->
  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <!-- Overlay shown on Start / Game Over -->
  <div class="overlay" id="overlay">
    <h2 id="overlayTitle">Snake</h2>
    <p id="overlayMsg">Use arrow keys or WASD to move</p>
    <button id="startBtn" onclick="startGame()">▶ Start</button>
  </div>

  <p class="hint">Arrow keys / WASD to move &nbsp;·&nbsp; Wraps through walls</p>

  <script src="script.js"></script>
</body>
</html>
